<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work Manager</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/lib/marked.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f1117; --surface: #1a1d27; --sidebar-bg: #13161e; --border: #2a2d3a;
      --text: #e8eaf0; --text-muted: #7c8091; --accent: #4f8ef7; --accent-hover: #3b7af0;
      --danger: #f87171; --tag-bg: #1e2a45; --tag-text: #93c5fd;
      --success-bg: #14281e; --success-text: #4ade80; --warning-bg: #2a2010; --warning-text: #fbbf24;
      color-scheme: dark;
    }
    * { box-sizing: border-box; }
    [x-cloak] { display: none !important; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    button, input, select, textarea {
      font: inherit;
    }
    button {
      cursor: pointer;
    }
    .app-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.875rem 1.25rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .brand {
      font-weight: 700;
      font-size: 1.1rem;
      white-space: nowrap;
    }
    .topnav {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .nav-btn, .filter-btn, .ghost-btn, .primary-btn, .danger-btn, .accordion-btn, .link-btn, .icon-btn {
      border: 1px solid var(--border);
      border-radius: 0.65rem;
      background: var(--surface);
      color: var(--text);
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }
    .nav-btn, .filter-btn, .ghost-btn, .primary-btn, .danger-btn, .link-btn {
      padding: 0.55rem 0.85rem;
    }
    .nav-btn.active, .filter-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .nav-btn:hover, .filter-btn:hover, .ghost-btn:hover, .primary-btn:hover, .danger-btn:hover, .link-btn:hover, .icon-btn:hover {
      border-color: var(--accent);
    }
    .primary-btn {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .primary-btn:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }
    .danger-btn {
      color: var(--danger);
      border-color: rgba(248, 113, 113, 0.25);
    }
    .danger-btn:hover {
      background: rgba(248, 113, 113, 0.1);
      border-color: rgba(248, 113, 113, 0.5);
    }
    .icon-btn {
      width: 2rem;
      height: 2rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .layout {
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      min-height: calc(100vh - 70px);
    }
    .sidebar {
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      padding: 1rem;
      overflow: auto;
    }
    .main {
      padding: 1.25rem;
      overflow: auto;
    }
    .sidebar-header, .panel-header, .modal-header, .toolbar, .row-between {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }
    .sidebar-header {
      margin-bottom: 1rem;
    }
    .sidebar-title {
      margin: 0;
      font-size: 1rem;
    }
    .sidebar-controls, .filter-group, .toolbar, .inline-actions, .tag-list, .badge-list, .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .sidebar-section {
      margin-bottom: 1rem;
    }
    .sidebar-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .list-item, .tree-item, .linked-card, .info-card, .card, .empty-state, .alert, .toast, .accordion-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.9rem;
    }
    .list-item {
      padding: 0.85rem;
      text-align: left;
      width: 100%;
    }
    .list-item.active, .tree-name.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
    }
    .list-item-title, .tree-name, .linked-title {
      font-weight: 600;
    }
    .muted {
      color: var(--text-muted);
    }
    .small {
      font-size: 0.875rem;
    }
    .tiny {
      font-size: 0.78rem;
    }
    .meta-line {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 0.35rem;
    }
    .status-badge, .tag {
      display: inline-flex;
      align-items: center;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      font-size: 0.78rem;
      line-height: 1.2;
      white-space: nowrap;
    }
    .tag {
      background: var(--tag-bg);
      color: var(--tag-text);
    }
    .status-draft, .status-open, .status-deprecated {
      background: var(--warning-bg);
      color: var(--warning-text);
    }
    .status-ready, .status-active, .status-validated, .status-resolved, .status-complete {
      background: var(--success-bg);
      color: var(--success-text);
    }
    .status-in_progress, .status-in_review, .status-investigating {
      background: var(--tag-bg);
      color: var(--tag-text);
    }
    .status-blocked, .status-abandoned, .status-on_hold {
      background: rgba(248, 113, 113, 0.12);
      color: var(--danger);
    }
    .panel {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .card, .accordion-panel, .empty-state, .alert {
      padding: 1rem;
    }
    .panel-header {
      margin-bottom: 0.75rem;
    }
    .breadcrumbs {
      display: flex;
      gap: 0.35rem;
      align-items: center;
      flex-wrap: wrap;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .breadcrumbs button {
      border: none;
      background: transparent;
      color: var(--accent);
      padding: 0;
    }
    .grid {
      display: grid;
      gap: 0.9rem;
    }
    .grid-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .grid-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    label {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      font-size: 0.92rem;
      font-weight: 600;
    }
    input:not([type=checkbox]):not([type=radio]), select, textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 0.7rem;
      background: var(--surface);
      color: var(--text);
      padding: 0.7rem 0.8rem;
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    .form-help {
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 400;
    }
    .required::after {
      content: " *";
      color: var(--danger);
    }
    .accordion-btn {
      width: 100%;
      padding: 0.85rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 600;
    }
    .stack {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .linked-card {
      padding: 0.8rem;
    }
    .linked-card-header, .tree-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .tree-row {
      margin-bottom: 0.35rem;
    }
    .tree-item {
      padding: 0.65rem;
    }
    .tree-children {
      margin-left: 1.1rem;
      padding-left: 0.6rem;
      border-left: 1px solid var(--border);
    }
    .tree-name {
      flex: 1;
      border: 1px solid transparent;
      border-radius: 0.6rem;
      background: transparent;
      text-align: left;
      padding: 0.35rem 0.45rem;
    }
    .accordion-content {
      margin-top: 0.9rem;
    }
    .preview {
      padding: 1rem;
      border-radius: 0.8rem;
      border: 1px solid var(--border);
      background: var(--sidebar-bg);
      overflow: auto;
    }
    .preview :first-child {
      margin-top: 0;
    }
    .preview :last-child {
      margin-bottom: 0;
    }
    .empty-state {
      text-align: center;
      color: var(--text-muted);
    }
    .alert.error {
      background: rgba(248, 113, 113, 0.1);
      color: var(--danger);
      border-color: rgba(248, 113, 113, 0.25);
    }
    .alert.info {
      background: rgba(79, 142, 247, 0.1);
      color: var(--tag-text);
      border-color: rgba(79, 142, 247, 0.2);
    }
    .toast-stack {
      position: fixed;
      top: 1rem;
      right: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      z-index: 50;
      max-width: min(420px, calc(100vw - 2rem));
    }
    .toast {
      padding: 0.85rem 1rem;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4);
    }
    .toast.success {
      background: var(--success-bg);
      color: var(--success-text);
      border-color: rgba(74, 222, 128, 0.2);
    }
    .toast.error {
      background: rgba(248, 113, 113, 0.12);
      color: var(--danger);
      border-color: rgba(248, 113, 113, 0.25);
    }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 40;
    }
    .modal {
      width: min(820px, 100%);
      max-height: calc(100vh - 2rem);
      overflow: auto;
      background: var(--surface);
      border-radius: 1rem;
      border: 1px solid var(--border);
      padding: 1rem;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
    }
    .modal-body {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1rem;
    }
    .error-text {
      color: var(--danger);
      font-size: 0.85rem;
      font-weight: 500;
    }
    .spacer-top {
      margin-top: 0.75rem;
    }
    @media (max-width: 1100px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .grid-2, .grid-3 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell" x-data="workManager()" x-init="init()" @keydown.escape.window="handleEscape()">
    <header class="topbar">
      <div class="brand">Work Manager</div>
      <nav class="topnav" aria-label="Primary">
        <button class="nav-btn" :class="{active: section === 'queue'}" @click="switchSection('queue')">Queue</button>
        <button class="nav-btn" :class="{active: section === 'projects'}" @click="switchSection('projects')">Projects</button>
        <button class="nav-btn" :class="{active: section === 'notes'}" @click="switchSection('notes')">Notes</button>
        <button class="nav-btn" :class="{active: section === 'designDocs'}" @click="switchSection('designDocs')">Design Docs</button>
        <button class="nav-btn" :class="{active: section === 'contextDocs'}" @click="switchSection('contextDocs')">Context Docs</button>
        <button class="nav-btn" :class="{active: section === 'issues'}" @click="switchSection('issues')">Issues</button>
        <button class="nav-btn" :class="{active: section === 'runbooks'}" @click="switchSection('runbooks')">Runbooks</button>
        <button class="nav-btn" :class="{active: section === 'toolDocs'}" @click="switchSection('toolDocs')">Tool Docs</button>
      </nav>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div>
            <h2 class="sidebar-title" x-text="sectionTitle()"></h2>
            <div class="muted small" x-text="sectionSubtitle()"></div>
          </div>
          <button class="primary-btn" @click="openCreateForSection()" x-text="sectionCreateLabel()"></button>
        </div>

        <template x-if="section === 'queue'">
          <div class="stack">
            <div class="sidebar-section filter-group">
              <template x-for="filter in queueFilters" :key="filter.value">
                <button class="filter-btn" :class="{active: queueFilter === filter.value}" @click="setQueueFilter(filter.value)" x-text="filter.label"></button>
              </template>
            </div>
            <div class="sidebar-list" x-show="!loadingList">
              <template x-for="task in queueTasks" :key="task.slug">
                <button class="list-item" :class="{active: selectedTask && selectedTask.slug === task.slug && section === 'queue'}" @click="loadTaskDetail(task.slug)">
                  <div class="list-item-title" x-text="task.title"></div>
                  <div class="meta-line">
                    <span class="status-badge" :class="statusClass(task.status)" x-text="formatStatus(task.status)"></span>
                    <span class="small muted" x-text="task.epic_slug || 'No epic'"></span>
                  </div>
                </button>
              </template>
              <div class="empty-state" x-show="!queueTasks.length && !loadingList">
                No tasks match this queue filter.
              </div>
            </div>
          </div>
        </template>

        <template x-if="section === 'projects'">
          <div class="stack">
            <label class="filter-toggle" style="display:flex;align-items:center;gap:6px;padding:4px 0 6px;font-size:0.8rem;color:var(--muted);cursor:pointer;">
              <input type="checkbox" x-model="showArchivedProjects" style="cursor:pointer;" />
              Show archived
            </label>
            <template x-for="project in projects.filter(p => showArchivedProjects || !p.archived_at)" :key="project.slug">
              <div class="tree-item">
                <div class="tree-row">
                  <button class="icon-btn" @click="toggleProject(project.slug)" :aria-label="expandedProjects[project.slug] ? 'Collapse project' : 'Expand project'">
                    <span x-text="expandedProjects[project.slug] ? '▾' : '▸'"></span>
                  </button>
                  <button class="tree-name" :class="{active: selectedProject && selectedProject.slug === project.slug && !selectedEpic && !selectedTask}" @click="selectProject(project)">
                    <span x-text="project.title"></span>
                  </button>
                </div>
                <div class="tree-children" x-show="expandedProjects[project.slug]">
                  <template x-for="epic in (project.epics || [])" :key="epic.slug">
                    <div class="spacer-top">
                      <div class="tree-row">
                        <button class="icon-btn" @click="toggleEpic(epic.slug)" :aria-label="expandedEpics[epic.slug] ? 'Collapse epic' : 'Expand epic'">
                          <span x-text="expandedEpics[epic.slug] ? '▾' : '▸'"></span>
                        </button>
                        <button class="tree-name" :class="{active: selectedEpic && selectedEpic.slug === epic.slug && !selectedTask}" @click="selectEpic(project, epic)">
                          <span x-text="epic.title"></span>
                        </button>
                      </div>
                      <div class="tree-children" x-show="expandedEpics[epic.slug]">
                        <template x-for="task in (epic.tasks || [])" :key="task.slug">
                          <button class="tree-name spacer-top" :class="{active: selectedTask && selectedTask.slug === task.slug && section === 'projects'}" @click="selectProjectTask(project, epic, task)">
                            <span x-text="task.title"></span>
                          </button>
                        </template>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </template>
            <div class="empty-state" x-show="!projects.filter(p => showArchivedProjects || !p.archived_at).length && !loadingList" x-text="projects.length && !showArchivedProjects ? 'All projects are archived. Check \'Show archived\' to view them.' : 'No projects yet. Create the first one.'"></div>
          </div>
        </template>

        <template x-if="section === 'notes'">
          <div class="stack">
            <div class="sidebar-section stack">
              <label>
                Search notes
                <input type="text" x-model="noteFilter" @keydown.enter.prevent="loadNotes()" placeholder="Title or content" />
              </label>
              <label>
                Filter by tag
                <input type="text" x-model="noteTagFilter" @keydown.enter.prevent="loadNotes()" placeholder="scope:project" />
              </label>
              <div class="button-group">
                <button class="primary-btn" @click="loadNotes()">Apply</button>
                <button class="ghost-btn" @click="noteFilter=''; noteTagFilter=''; loadNotes()">Reset</button>
              </div>
            </div>
            <div class="sidebar-list" x-show="!loadingList">
              <template x-for="note in notes" :key="note.slug">
                <button class="list-item" :class="{active: selectedNote && selectedNote.slug === note.slug}" @click="loadNoteDetail(note.slug)">
                  <div class="list-item-title" x-text="note.title"></div>
                  <div class="meta-line tag-list">
                    <template x-for="tag in (note.tags || []).slice(0, 3)" :key="tag"><span class="tag" x-text="tag"></span></template>
                  </div>
                </button>
              </template>
              <div class="empty-state" x-show="!notes.length && !loadingList">No notes found.</div>
            </div>
          </div>
        </template>

        <template x-if="section === 'designDocs'">
          <div class="stack">
            <label>
              Filter design docs
              <input type="text" x-model="designDocFilter" placeholder="Search title or slug" />
            </label>
            <div class="sidebar-list" x-show="!loadingList">
              <template x-for="doc in filteredDesignDocs()" :key="doc.slug">
                <button class="list-item" :class="{active: selectedDesignDoc && selectedDesignDoc.slug === doc.slug}" @click="loadDesignDocDetail(doc.slug)">
                  <div class="list-item-title" x-text="doc.title"></div>
                  <div class="meta-line"><span class="small muted" x-text="doc.doc_type || 'design_doc'"></span></div>
                </button>
              </template>
              <div class="empty-state" x-show="!filteredDesignDocs().length && !loadingList">No design docs match the current filter.</div>
            </div>
          </div>
        </template>

        <template x-if="section === 'contextDocs'">
          <div class="stack">
            <label>
              Filter context docs
              <input type="text" x-model="contextDocFilter" placeholder="Search title or slug" />
            </label>
            <div class="sidebar-list" x-show="!loadingList">
              <template x-for="doc in filteredContextDocs()" :key="doc.slug">
                <button class="list-item" :class="{active: selectedContextDoc && selectedContextDoc.slug === doc.slug}" @click="loadContextDocDetail(doc.slug)">
                  <div class="list-item-title" x-text="doc.title"></div>
                  <div class="meta-line tag-list">
                    <template x-for="tag in (doc.tags || []).slice(0, 2)" :key="tag"><span class="tag" x-text="tag"></span></template>
                    <span class="small muted" x-show="(doc.links || []).length" x-text="(doc.links || []).length + ' link(s)'"></span>
                  </div>
                </button>
              </template>
              <div class="empty-state" x-show="!filteredContextDocs().length && !loadingList">No context docs match the current filter.</div>
            </div>
          </div>
        </template>

        <template x-if="section === 'issues'">
          <div class="stack">
            <label>
              Filter by task slug
              <input list="tasks-datalist" type="text" x-model="issueFilter" @keydown.enter.prevent="loadIssues()" placeholder="Type to search..." />
            </label>
            <div class="button-group">
              <button class="primary-btn" @click="loadIssues()">Apply</button>
              <button class="ghost-btn" @click="issueFilter=''; loadIssues()">Reset</button>
            </div>
            <div class="sidebar-list" x-show="!loadingList">
              <template x-for="issue in issues" :key="issue.slug">
                <button class="list-item" :class="{active: selectedIssue && selectedIssue.slug === issue.slug}" @click="loadIssueDetail(issue.slug)">
                  <div class="list-item-title" x-text="issue.title"></div>
                  <div class="meta-line">
                    <span class="status-badge" :class="statusClass(issue.status || 'open')" x-text="formatStatus(issue.status || 'open')"></span>
                    <span class="small muted" x-text="issue.linked_task_slug || 'No task linked'"></span>
                  </div>
                </button>
              </template>
              <div class="empty-state" x-show="!issues.length && !loadingList">No issues found.</div>
            </div>
          </div>
        </template>

        <template x-if="section === 'runbooks'">
          <div class="stack">
            <label>
              Filter runbooks
              <input type="text" x-model="runbookFilter" placeholder="Search title or slug" />
            </label>
            <label>
              Filter by project
              <input list="projects-datalist" type="text" x-model="runbookProjectFilter" @input="loadRunbooks()" placeholder="Project slug..." />
            </label>
            <div class="sidebar-list" x-show="!loadingList">
              <template x-for="runbook in filteredRunbooks()" :key="runbook.slug">
                <button class="list-item" :class="{active: selectedRunbook && selectedRunbook.slug === runbook.slug}" @click="loadRunbookDetail(runbook.slug)">
                  <div class="list-item-title" x-text="runbook.title"></div>
                  <div class="meta-line">
                    <span class="status-badge" :class="statusClass(runbook.status || 'draft')" x-text="formatStatus(runbook.status || 'draft')"></span>
                    <span class="small muted" x-show="runbook.project_slug" x-text="runbook.project_slug"></span>
                  </div>
                </button>
              </template>
              <div class="empty-state" x-show="!filteredRunbooks().length && !loadingList">No runbooks match the current filter.</div>
            </div>
          </div>
        </template>

        <template x-if="section === 'toolDocs'">
          <div class="stack">
            <div class="sidebar-list" x-show="!loadingList">
              <template x-for="doc in toolDocs" :key="doc.slug">
                <button class="list-item" :class="{active: selectedToolDoc && selectedToolDoc.slug === doc.slug}" @click="loadToolDocDetail(doc.slug)">
                  <div class="list-item-title" x-text="doc.title"></div>
                  <div class="meta-line tag-list">
                    <template x-for="tag in (doc.tags || []).slice(0, 3)" :key="tag"><span class="tag" x-text="tag"></span></template>
                  </div>
                </button>
              </template>
              <div class="empty-state" x-show="!toolDocs.length && !loadingList">No tool docs yet.</div>
            </div>
          </div>
        </template>

        <div class="empty-state" x-show="loadingList">Loading…</div>
      </aside>

      <main class="main">
        <div class="panel">
          <div class="alert error" x-show="apiError" x-text="apiError"></div>

          <template x-if="section === 'queue' && loadingDetail">
            <div class="empty-state">Loading task detail…</div>
          </template>

  <script>
    function workManager() {
      return {
        section: 'queue',
        queueFilter: 'active',
        queueTasks: [],
        selectedTask: null,
        loadingDetail: false,
        briefOpen: false,
        briefContent: '',
        siblingTasks: [],

        projects: [],
        allProjects: [],
        allEpics: [],
        allTasks: [],
        allDesignDocs: [],

        selectedProject: null,
        selectedEpic: null,
        showArchivedProjects: false,
        expandedProjects: {},
        expandedEpics: {},

        notes: [],
        noteFilter: '',
        noteTagFilter: '',
        selectedNote: null,

        designDocs: [],
        designDocFilter: '',
        selectedDesignDoc: null,

        issues: [],
        issueFilter: '',
        selectedIssue: null,

        runbooks: [],
        runbookFilter: '',
        runbookProjectFilter: '',
        selectedRunbook: null,
        allRunbooks: [],
        allIssues: [],

        contextDocs: [],
        contextDocFilter: '',
        selectedContextDoc: null,
        allContextDocs: [],

        toolDocs: [],
        selectedToolDoc: null,

        modal: null,
        modalForm: {},

        toasts: [],
        apiError: null,

        loadingList: false,
        noteInlineError: '',
        accordions: {
          criteria: true,
          testing: true,
          dod: true,
          brief: false,
          issues: true,
          siblings: false,
          taskContextDocs: false,
          contextDocLinks: true,
        },
        projectStatuses: ['draft', 'active', 'on_hold', 'complete'],
        taskStatuses: ['draft', 'in_progress', 'in_review', 'complete', 'blocked', 'abandoned'],
        runbookStatuses: ['draft', 'active', 'deprecated'],
        queueFilters: [
          { label: 'Active', value: 'active' },
          { label: 'All', value: 'all' },
          { label: 'Draft', value: 'draft' },
          { label: 'In Progress', value: 'in_progress' },
          { label: 'In Review', value: 'in_review' },
          { label: 'Complete', value: 'complete' },
          { label: 'Blocked', value: 'blocked' },
          { label: 'Abandoned', value: 'abandoned' },
        ],

        async init() {
          await this.refreshProjects();
          await this.loadQueue();
          try {
            const [allDD, allI, allR, allCD] = await Promise.all([
              this.api('GET', '/api/design-docs'),
              this.api('GET', '/api/issues'),
              this.api('GET', '/api/runbooks'),
              this.api('GET', '/api/context-docs'),
            ]);
            this.allDesignDocs = (allDD || []).map(d => ({ id: d.id, slug: d.slug, title: d.title }));
            this.allIssues = (allI || []).map(i => ({ id: i.id, slug: i.slug, title: i.title }));
            this.allRunbooks = (allR || []).map(r => ({ id: r.id, slug: r.slug, title: r.title }));
            this.allContextDocs = (allCD || []).map(d => ({ id: d.id, slug: d.slug, title: d.title }));
          } catch (err) {
            this.handleError(err);
          }
        },

        async api(method, path, body) {
          this.apiError = null;
          const opts = { method, headers: { 'Content-Type': 'application/json' } };
          if (body) opts.body = JSON.stringify(body);
          const r = await fetch(path, opts);
          if (!r.ok) {
            const err = await r.text();
            throw { status: r.status, message: err || 'Request failed' };
          }
          if (r.status === 204) return null;
          return r.json();
        },

        async apiText(path) {
          this.apiError = null;
          const r = await fetch(path);
          if (!r.ok) {
            const err = await r.text();
            throw { status: r.status, message: err || 'Request failed' };
          }
          return r.text();
        },

        handleError(err, fallback = 'Request failed') {
          const message = err?.message || fallback;
          this.apiError = message;
          this.showToast(message, 'error');
        },

        showToast(message, type = 'success') {
          const id = Date.now() + Math.random();
          this.toasts.push({ id, message, type });
          setTimeout(() => {
            this.toasts = this.toasts.filter(t => t.id !== id);
          }, 3000);
        },

        sectionTitle() {
          return {
            queue: 'Queue',
            projects: 'Projects',
            notes: 'Notes',
            designDocs: 'Design Docs',
            contextDocs: 'Context Docs',
            issues: 'Issues',
            runbooks: 'Runbooks',
            toolDocs: 'Tool Docs',
          }[this.section];
        },

        sectionSubtitle() {
          return {
            queue: 'Find and work the next task.',
            projects: 'Browse the project hierarchy.',
            notes: 'Scoped context and decisions.',
            designDocs: 'Long-form design decisions.',
            contextDocs: 'Attachable reference documents.',
            issues: 'Track task-linked problems.',
            runbooks: 'Operational response guides.',
            toolDocs: 'Indexed external documentation.',
          }[this.section];
        },

        sectionCreateLabel() {
          return {
            queue: '+ New Task',
            projects: '+ New Project',
            notes: '+ New Note',
            designDocs: '+ New Design Doc',
            contextDocs: '+ New Context Doc',
            issues: '+ New Issue',
            runbooks: '+ New Runbook',
            toolDocs: '+ New Tool Doc',
          }[this.section];
        },

        async switchSection(section) {
          this.section = section;
          this.apiError = null;
          this.selectedTask = null;
          if (section !== 'projects') { this.selectedProject = null; this.selectedEpic = null; }
          if (section !== 'notes') this.selectedNote = null;
          if (section !== 'designDocs') this.selectedDesignDoc = null;
          if (section !== 'contextDocs') this.selectedContextDoc = null;
          if (section !== 'issues') this.selectedIssue = null;
          if (section !== 'runbooks') this.selectedRunbook = null;
          if (section !== 'toolDocs') this.selectedToolDoc = null;
          if (section === 'queue') await this.loadQueue();
          if (section === 'projects') await this.refreshProjects();
          if (section === 'notes') await this.loadNotes();
          if (section === 'designDocs') await this.loadDesignDocs();
          if (section === 'contextDocs') await this.loadContextDocs();
          if (section === 'issues') await this.loadIssues();
          if (section === 'runbooks') await this.loadRunbooks();
          if (section === 'toolDocs') await this.loadToolDocs();
        },

        clearSelection() {
          if (this.section === 'queue') {
            this.selectedTask = null;
            return;
          }
          if (this.section === 'projects') {
            this.selectedProject = null;
            this.selectedEpic = null;
            this.selectedTask = null;
            return;
          }
          if (this.section === 'notes') this.selectedNote = null;
          if (this.section === 'designDocs') this.selectedDesignDoc = null;
          if (this.section === 'contextDocs') this.selectedContextDoc = null;
          if (this.section === 'issues') this.selectedIssue = null;
          if (this.section === 'runbooks') this.selectedRunbook = null;
          if (this.section === 'toolDocs') this.selectedToolDoc = null;
        },

        formatStatus(status) {
          return (status || '').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        },

        statusClass(status) {
          return `status-${status || 'draft'}`;
        },

        formatCsv(value) {
          if (Array.isArray(value)) return value.join(', ');
          return value || '';
        },

        csvToArray(value) {
          return (value || '').split(',').map(v => v.trim()).filter(Boolean);
        },

        renderMarkdown(content) {
          return marked.parse(content || '');
        },

        handleEscape() {
          if (this.modal) this.closeModal();
        },

        defaultModalForm(type, data = {}) {
          const base = {
            project: { title: '', goal: '', description: '', status: 'draft', tags_text: '' },
            epic: { title: '', description: '', project_slug: '', status: 'draft', tags_text: '', blocked_reason: '' },
            task: { title: '', description: '', status: 'draft', epic_slug: '', assignee: '', estimated_effort: '', tags_text: '', blocked_reason: '', context_snapshot: '' },
           note: { title: '', body: '', tags_text: '', scopeError: '' },
           designDoc: { title: '', content: '', tags_text: '', epic_slug: '' },
           issue: { title: '', severity: 'sev2', task_slug: '', linked_runbook_slugs_text: '', triage_steps: '', root_cause: '', resolution: '', lessons_learned: '' },
           runbook: { title: '', service: '', category: '', steps: '', status: 'draft', tags_text: '', symptoms: '', prerequisites: '', verification: '', escalation: '', linked_issue_slugs_text: '', project_slug: '' },
           contextDoc: { title: '', content: '', tags_text: '', entity_type: '', entity_slug: '' },
            toolDoc: { title: '', repo_url: '', tags_text: '' },
          };
          return { ...base[type], ...data };
        },

        openModal(type, data = {}) {
          this.modal = { type, mode: 'create', data };
          this.modalForm = this.defaultModalForm(type, data);
          this.$nextTick(() => this.$refs.modalFirst?.focus());
        },

        closeModal() {
          this.modal = null;
          this.modalForm = {};
        },

        openCreateForSection() {
          if (this.section === 'queue') this.openModal('task');
          if (this.section === 'projects') this.openModal('project');
          if (this.section === 'notes') this.openModal('note');
          if (this.section === 'designDocs') this.openModal('designDoc');
          if (this.section === 'contextDocs') this.openModal('contextDoc');
          if (this.section === 'issues') this.openModal('issue', this.selectedTask ? { task_slug: this.selectedTask.slug } : {});
          if (this.section === 'runbooks') this.openModal('runbook');
          if (this.section === 'toolDocs') this.openModal('toolDoc');
        },

        modalTitle() {
          if (!this.modal) return '';
          const labels = { designDoc: 'Design Doc', contextDoc: 'Context Doc', toolDoc: 'Tool Doc' };
          const t = this.modal.type;
          return `New ${labels[t] || (t.charAt(0).toUpperCase() + t.slice(1))}`;
        },

        validateNoteTags(tags) {
          return (tags || []).some(tag => tag.startsWith('scope:'));
        },

        async submitModal() {
          if (!this.modal) return;
          try {
            let result = null;
            if (this.modal.type === 'project') {
              result = await this.api('POST', '/api/projects', {
                title: this.modalForm.title,
                goal: this.modalForm.goal,
                description: this.modalForm.description,
                status: this.modalForm.status,
                tags: this.csvToArray(this.modalForm.tags_text),
              });
              await this.refreshProjects();
              if (result?.slug) this.openProjectBySlug(result.slug);
            }
            if (this.modal.type === 'epic') {
              const projectSlug = this.modalForm.project_slug;
              result = await this.api('POST', `/api/projects/${projectSlug}/epics`, {
                title: this.modalForm.title,
                description: this.modalForm.description,
                status: this.modalForm.status,
                tags: this.csvToArray(this.modalForm.tags_text),
                blocked_reason: this.modalForm.blocked_reason || null,
              });
              await this.refreshProjects();
              if (result?.slug) this.openEpicBySlug(result.slug);
            }
            if (this.modal.type === 'task') {
              const epicSlug = this.modalForm.epic_slug;
              result = await this.api('POST', `/api/epics/${epicSlug}/tasks`, {
                title: this.modalForm.title,
                description: this.modalForm.description || null,
                status: this.modalForm.status,
                assignee: this.modalForm.assignee || null,
                estimated_effort: this.modalForm.estimated_effort || null,
                tags: this.csvToArray(this.modalForm.tags_text),
                blocked_reason: this.modalForm.blocked_reason || null,
                context_snapshot: this.modalForm.context_snapshot || null,
              });
              await Promise.all([this.refreshProjects(), this.loadQueue()]);
              if (result?.slug) await this.openTaskFromSlug(result.slug, this.section === 'projects' ? 'projects' : 'queue');
            }
            if (this.modal.type === 'note') {
              const tags = this.csvToArray(this.modalForm.tags_text);
              if (!this.validateNoteTags(tags)) {
                this.modalForm.scopeError = 'At least one tag must start with scope:.';
                return;
              }
              result = await this.api('POST', '/api/notes', {
                title: this.modalForm.title,
                body: this.modalForm.body,
                tags,
              });
              await this.loadNotes();
              if (result?.slug) await this.loadNoteDetail(result.slug);
            }
            if (this.modal.type === 'designDoc') {
              result = await this.api('POST', '/api/design-docs', {
                title: this.modalForm.title,
                content: this.modalForm.content,
                tags: this.csvToArray(this.modalForm.tags_text),
                epic_slug: this.modalForm.epic_slug || null,
              });
              await this.loadDesignDocs();
              if (result?.slug) await this.loadDesignDocDetail(result.slug);
            }
            if (this.modal.type === 'issue') {
              const linkedRunbookIds = this.csvToArray(this.modalForm.linked_runbook_slugs_text)
                .map(s => { const r = this.allRunbooks.find(x => x.slug === s.trim()); return r ? r.id : null; })
                .filter(id => id !== null);
              result = await this.api('POST', '/api/issues', {
                title: this.modalForm.title,
                severity: this.modalForm.severity,
                task_slug: this.modalForm.task_slug || null,
                linked_runbook_ids: linkedRunbookIds,
                triage_steps: this.modalForm.triage_steps || null,
                root_cause: this.modalForm.root_cause || null,
                resolution: this.modalForm.resolution || null,
                lessons_learned: this.modalForm.lessons_learned || null,
              });
              await this.loadIssues();
              this.allIssues = (await this.api('GET', '/api/issues')).map(i => ({ id: i.id, slug: i.slug, title: i.title }));
              if (this.selectedTask?.slug === this.modalForm.task_slug) await this.loadTaskDetail(this.selectedTask.slug);
              if (result?.slug && this.section === 'issues') await this.loadIssueDetail(result.slug);
            }
            if (this.modal.type === 'runbook') {
              const linkedIssueIds = this.csvToArray(this.modalForm.linked_issue_slugs_text)
                .map(s => { const i = this.allIssues.find(x => x.slug === s.trim()); return i ? i.id : null; })
                .filter(id => id !== null);
              result = await this.api('POST', '/api/runbooks', {
                title: this.modalForm.title,
                service: this.modalForm.service,
                category: this.modalForm.category,
                steps: this.modalForm.steps,
                status: this.modalForm.status,
                tags: this.csvToArray(this.modalForm.tags_text),
                symptoms: this.modalForm.symptoms || null,
                prerequisites: this.modalForm.prerequisites || null,
                verification: this.modalForm.verification || null,
                escalation: this.modalForm.escalation || null,
                linked_issue_ids: linkedIssueIds,
                project_slug: this.modalForm.project_slug || null,
              });
              await this.loadRunbooks();
              this.allRunbooks = (await this.api('GET', '/api/runbooks')).map(r => ({ id: r.id, slug: r.slug, title: r.title }));
              if (result?.slug) await this.loadRunbookDetail(result.slug);
            }
            if (this.modal.type === 'contextDoc') {
              result = await this.api('POST', '/api/context-docs', {
                title: this.modalForm.title,
                content: this.modalForm.content,
                tags: this.csvToArray(this.modalForm.tags_text),
                entity_type: this.modalForm.entity_type || null,
                entity_slug: this.modalForm.entity_slug || null,
              });
              await this.loadContextDocs();
              if (result?.slug) {
                if (this.section !== 'contextDocs') await this.switchSection('contextDocs');
                await this.loadContextDocDetail(result.slug);
              }
            }
            if (this.modal.type === 'toolDoc') {
              result = await this.api('POST', '/api/tool-docs', {
                title: this.modalForm.title,
                repo_url: this.modalForm.repo_url,
                tags: this.csvToArray(this.modalForm.tags_text),
              });
              await this.loadToolDocs();
              if (result?.slug) await this.loadToolDocDetail(result.slug);
            }
            this.showToast(`${this.modalTitle()} created.`);
            this.closeModal();
          } catch (err) {
            this.handleError(err);
          }
        },

        async refreshProjects() {
          try {
            const [projectsData, epicsData, tasksData] = await Promise.all([
              this.api('GET', '/api/projects'),
              this.api('GET', '/api/epics'),
              this.api('GET', '/api/tasks'),
            ]);
            this.allProjects = (projectsData || []).map(p => ({ slug: p.slug, title: p.title, status: p.status }));
            this.allEpics = epicsData || [];
            this.allTasks = tasksData || [];
            this.projects = (projectsData || []).map(p => ({
              ...p,
              epics: (epicsData || []).filter(e => e.project_slug === p.slug).map(e => ({
                ...e,
                tasks: (tasksData || []).filter(t => t.epic_slug === e.slug),
              })),
            }));
          } catch (err) {
            this.handleError(err);
          }
        },

        async loadQueue() {
          this.loadingList = true;
          try {
            if (this.queueFilter === 'active') {
              const [ip, draft] = await Promise.all([
                this.api('GET', '/api/tasks?status=in_progress'),
                this.api('GET', '/api/tasks?status=draft'),
              ]);
              this.queueTasks = [...(ip || []), ...(draft || [])];
            } else if (this.queueFilter === 'all') {
              this.queueTasks = await this.api('GET', '/api/tasks');
            } else {
              this.queueTasks = await this.api('GET', `/api/tasks?status=${this.queueFilter}`);
            }
            if (this.section === 'queue' && (!this.selectedTask || !this.queueTasks.some(t => t.slug === this.selectedTask.slug))) {
              this.selectedTask = null;
            }
          } catch (err) {
            this.handleError(err);
          } finally {
            this.loadingList = false;
          }
        },

        async setQueueFilter(filter) {
          this.queueFilter = filter;
          await this.loadQueue();
        },

        async loadTaskDetail(slug) {
          this.loadingDetail = true;
          this.selectedTask = null;
          this.briefContent = '';
          this.briefOpen = false;
          try {
           const [task, criteria, layers, dod, issues, contextDocsLinks] = await Promise.all([
              this.api('GET', `/api/tasks/${slug}`),
             this.api('GET', `/api/tasks/${slug}/acceptance-criteria`),
             this.api('GET', `/api/tasks/${slug}/testing-layers`),
             this.api('GET', `/api/tasks/${slug}/dod`),
             this.api('GET', `/api/issues?task=${encodeURIComponent(slug)}`),
             this.api('GET', `/api/context-docs?entity_type=task&entity_slug=${encodeURIComponent(slug)}`),
            ]);
            this.selectedTask = {
              ...task,
             acceptance_criteria: criteria || [],
             testing_layers: layers || [],
             dod: dod || {},
             linked_issues: issues || [],
             context_docs: contextDocsLinks || [],
              _newCriterion: { description: '' },
              _newLayer: { layer: '', description: '' },
              _dodDraft: {
                dod_description: dod?.dod_description || dod?.description || '',
                checklist: Array.isArray(dod?.checklist) ? dod.checklist : [],
              },
            };
            this.siblingTasks = this.allTasks.filter(t => t.epic_slug === task.epic_slug && t.slug !== slug);
            this.selectedEpic = this.allEpics.find(e => e.slug === task.epic_slug) || null;
            this.selectedProject = this.getProjectForEpic(this.selectedEpic);
            if (this.selectedProject) this.expandedProjects[this.selectedProject.slug] = true;
            if (this.selectedEpic) this.expandedEpics[this.selectedEpic.slug] = true;
          } catch (err) {
            this.handleError(err);
          } finally {
            this.loadingDetail = false;
          }
        },

        getProjectForEpic(epic) {
          if (!epic) return null;
          return this.projects.find(p => p.slug === epic.project_slug || (p.epics || []).some(e => e.slug === epic.slug)) || null;
        },

        taskBreadcrumbs(task) {
          const epic = this.allEpics.find(e => e.slug === task?.epic_slug);
          const project = this.getProjectForEpic(epic);
          const crumbs = [];
          if (project) crumbs.push({ type: 'project', slug: project.slug, title: project.title });
          if (epic) crumbs.push({ type: 'epic', slug: epic.slug, title: epic.title });
          if (task) crumbs.push({ type: 'task', slug: task.slug, title: task.title });
          return crumbs;
        },

        toggleProject(slug) {
          this.expandedProjects[slug] = !this.expandedProjects[slug];
        },

        toggleEpic(slug) {
          this.expandedEpics[slug] = !this.expandedEpics[slug];
        },

        selectProject(project) {
          this.section = 'projects';
          this.selectedProject = JSON.parse(JSON.stringify(project));
          this.selectedEpic = null;
          this.selectedTask = null;
          this.expandedProjects[project.slug] = true;
        },

        async selectEpic(project, epic) {
          this.section = 'projects';
          this.selectedProject = JSON.parse(JSON.stringify(project));
          this.selectedEpic = JSON.parse(JSON.stringify({ ...epic, project_slug: epic.project_slug || project.slug, _linkDesignDocSlug: '' }));
          this.selectedTask = null;
          this.expandedProjects[project.slug] = true;
          this.expandedEpics[epic.slug] = true;
          await this.loadEpicDesignDocs(epic.slug);
        },

        async selectProjectTask(project, epic, task) {
          this.section = 'projects';
          this.selectedProject = JSON.parse(JSON.stringify(project));
          this.selectedEpic = JSON.parse(JSON.stringify({ ...epic, project_slug: epic.project_slug || project.slug }));
          await this.loadTaskDetail(task.slug);
        },

        openProjectBySlug(slug) {
          const project = this.projects.find(p => p.slug === slug);
          if (project) this.selectProject(project);
        },

        openEpicBySlug(slug) {
          const epic = this.allEpics.find(e => e.slug === slug);
          const project = this.getProjectForEpic(epic);
          if (epic && project) this.selectEpic(project, epic);
        },

        async openTaskFromSlug(slug, forceSection = 'queue') {
          this.section = forceSection;
          await this.loadTaskDetail(slug);
        },

        async saveProject() {
          try {
            await this.api('PATCH', `/api/projects/${this.selectedProject.slug}`, {
              title: this.selectedProject.title,
              goal: this.selectedProject.goal,
              description: this.selectedProject.description,
              status: this.selectedProject.status,
              tags: Array.isArray(this.selectedProject.tags) ? this.selectedProject.tags : this.csvToArray(this.selectedProject.tags || ''),
            });
            this.showToast('Project updated.');
            await this.refreshProjects();
            this.openProjectBySlug(this.selectedProject.slug);
          } catch (err) {
            this.handleError(err);
          }
        },

        async archiveProject() {
          if (!confirm('Archive this project?')) return;
          try {
            await this.api('PATCH', `/api/projects/${this.selectedProject.slug}`, {
              archived_at: new Date().toISOString(),
            });
            this.showToast('Project archived.');
            await this.refreshProjects();
            this.selectedProject = null;
          } catch (err) {
            this.handleError(err);
          }
        },

        async saveEpic() {
          try {
            await this.api('PATCH', `/api/epics/${this.selectedEpic.slug}`, {
              title: this.selectedEpic.title,
              description: this.selectedEpic.description,
              status: this.selectedEpic.status,
              tags: Array.isArray(this.selectedEpic.tags) ? this.selectedEpic.tags : this.csvToArray(this.selectedEpic.tags || ''),
              blocked_reason: this.selectedEpic.blocked_reason || null,
            });
            this.showToast('Epic updated.');
            await this.refreshProjects();
            this.openEpicBySlug(this.selectedEpic.slug);
          } catch (err) {
            this.handleError(err);
          }
        },

        async archiveEpic() {
          if (!confirm('Archive this epic?')) return;
          try {
            await this.api('PATCH', `/api/epics/${this.selectedEpic.slug}`, { status: 'abandoned' });
            this.showToast('Epic archived.');
            await this.refreshProjects();
            this.selectedEpic = null;
          } catch (err) {
            this.handleError(err);
          }
        },

        epicDesignDocs(epic) {
          return epic?.epicDesignDocsList || epic?.design_docs || [];
        },

        async loadEpicDesignDocs(epicSlug) {
          try {
            const docs = await this.api('GET', `/api/epics/${epicSlug}/design-docs`);
            if (this.selectedEpic?.slug === epicSlug) {
              this.selectedEpic = { ...this.selectedEpic, epicDesignDocsList: docs || [] };
            }
          } catch (err) {
            this.handleError(err);
          }
        },

        async linkDesignDoc() {
          const selectedSlug = this.selectedEpic?._linkDesignDocSlug;
          const doc = this.allDesignDocs.find(d => d.slug === selectedSlug);
          if (!doc) {
            this.showToast('Select a valid design doc slug.', 'error');
            return;
          }
          try {
            await this.api('POST', `/api/epics/${this.selectedEpic.slug}/design-docs`, { design_doc_id: doc.id });
            this.showToast('Design doc linked.');
            await this.loadEpicDesignDocs(this.selectedEpic.slug);
          } catch (err) {
            this.handleError(err);
          }
        },

        async unlinkDesignDoc(doc) {
          if (!confirm('Unlink this design doc from the epic?')) return;
          try {
            await this.api('DELETE', `/api/epics/${this.selectedEpic.slug}/design-docs/${doc.id}`);
            this.showToast('Design doc unlinked.');
            await this.loadEpicDesignDocs(this.selectedEpic.slug);
          } catch (err) {
            if (err?.status === 404) {
              this.showToast('Design doc unlink is not yet supported.', 'error');
              return;
            }
            this.handleError(err);
          }
        },

        async saveTask() {
          try {
            const slug = this.selectedTask.slug;
            await this.api('PATCH', `/api/tasks/${slug}`, {
              title: this.selectedTask.title,
              description: this.selectedTask.description || null,
              status: this.selectedTask.status,
              assignee: this.selectedTask.assignee || null,
              estimated_effort: this.selectedTask.estimated_effort || null,
              tags: Array.isArray(this.selectedTask.tags) ? this.selectedTask.tags : this.csvToArray(this.selectedTask.tags || ''),
              blocked_reason: this.selectedTask.blocked_reason || null,
              context_snapshot: this.selectedTask.context_snapshot || null,
            });
            this.showToast('Task updated.');
            await Promise.all([this.refreshProjects(), this.loadQueue()]);
            await this.loadTaskDetail(slug);
          } catch (err) {
            this.handleError(err);
          }
        },

        async changeTaskStatus(status) {
          try {
            const slug = this.selectedTask.slug;
            await this.api('PATCH', `/api/tasks/${slug}`, { status });
            this.showToast('Task status updated.');
            await Promise.all([this.refreshProjects(), this.loadQueue()]);
            await this.loadTaskDetail(slug);
          } catch (err) {
            this.handleError(err);
          }
        },

        async archiveTask() {
          if (!confirm('Archive this task?')) return;
          try {
            await this.api('PATCH', `/api/tasks/${this.selectedTask.slug}`, { status: 'abandoned' });
            const slug = this.selectedTask.slug;
            this.showToast('Task archived.');
            await Promise.all([this.refreshProjects(), this.loadQueue()]);
            if (this.section === 'projects') this.selectedTask = null;
            if (this.section === 'queue' && this.queueTasks.length && this.queueTasks[0].slug !== slug) {
              await this.loadTaskDetail(this.queueTasks[0].slug);
            }
          } catch (err) {
            this.handleError(err);
          }
        },

        async addAcceptanceCriterion() {
          if (!this.selectedTask._newCriterion.description) {
            this.showToast('Criterion description is required.', 'error');
            return;
          }
          try {
            await this.api('POST', `/api/tasks/${this.selectedTask.slug}/acceptance-criteria`, {
              description: this.selectedTask._newCriterion.description,
            });
            this.showToast('Acceptance criterion added.');
            await this.loadTaskDetail(this.selectedTask.slug);
          } catch (err) {
            this.handleError(err);
          }
        },

        async deleteAcceptanceCriterion(id) {
          if (!confirm('Delete this acceptance criterion?')) return;
          try {
            await this.api('DELETE', `/api/tasks/${this.selectedTask.slug}/acceptance-criteria/${id}`);
            this.showToast('Acceptance criterion removed.');
            await this.loadTaskDetail(this.selectedTask.slug);
          } catch (err) {
            this.handleError(err);
          }
        },

        async addTestingLayer() {
          if (!this.selectedTask._newLayer.layer || !this.selectedTask._newLayer.description) {
            this.showToast('Layer and description are required.', 'error');
            return;
          }
          try {
            await this.api('POST', `/api/tasks/${this.selectedTask.slug}/testing-layers`, {
              layer: this.selectedTask._newLayer.layer,
              description: this.selectedTask._newLayer.description,
            });
            this.showToast('Testing layer added.');
            await this.loadTaskDetail(this.selectedTask.slug);
          } catch (err) {
            this.handleError(err);
          }
        },

        async deleteTestingLayer(id) {
          if (!confirm('Delete this testing layer?')) return;
          try {
            await this.api('DELETE', `/api/tasks/${this.selectedTask.slug}/testing-layers/${id}`);
            this.showToast('Testing layer removed.');
            await this.loadTaskDetail(this.selectedTask.slug);
          } catch (err) {
            this.handleError(err);
          }
        },

        async saveDoD() {
          try {
            await this.api('PATCH', `/api/tasks/${this.selectedTask.slug}/dod`, {
              dod_description: this.selectedTask._dodDraft.dod_description || this.selectedTask._dodDraft.description,
              checklist: (this.selectedTask._dodDraft.checklist || []).length
                ? this.selectedTask._dodDraft.checklist
                : this.csvToArray(this.selectedTask._dodDraft.required_checks || '').map(item => ({ item, checked: false })),
            });
            this.showToast('Definition of Done updated.');
            await this.loadTaskDetail(this.selectedTask.slug);
          } catch (err) {
            this.handleError(err);
          }
        },

        toggleAccordion(key) {
          this.accordions[key] = !this.accordions[key];
        },

        async toggleBrief() {
          this.briefOpen = !this.briefOpen;
          if (!this.briefOpen || this.briefContent) return;
          try {
            this.briefContent = await this.apiText(`/api/briefs/task/${this.selectedTask.slug}/markdown`);
          } catch (err) {
            this.handleError(err);
          }
        },

        async loadNotes() {
          this.loadingList = true;
          try {
            const params = new URLSearchParams();
            if (this.noteTagFilter) params.set('tag', this.noteTagFilter);
            if (this.noteFilter) params.set('search', this.noteFilter);
            const query = params.toString() ? `?${params.toString()}` : '';
            this.notes = await this.api('GET', `/api/notes${query}`);
          } catch (err) {
            this.handleError(err);
          } finally {
            this.loadingList = false;
          }
        },

        async loadNoteDetail(slug) {
          try {
            this.selectedNote = await this.api('GET', `/api/notes/${slug}`);
            this.noteInlineError = '';
          } catch (err) {
            this.handleError(err);
          }
        },

        async saveNote() {
          try {
            const tags = Array.isArray(this.selectedNote.tags) ? this.selectedNote.tags : this.csvToArray(this.selectedNote.tags);
            if (!this.validateNoteTags(tags)) {
              this.noteInlineError = 'At least one tag must start with scope:.';
              this.showToast(this.noteInlineError, 'error');
              return;
            }
            await this.api('PATCH', `/api/notes/${this.selectedNote.slug}`, {
              title: this.selectedNote.title,
              body: this.selectedNote.body,
              tags,
            });
            this.showToast('Note updated.');
            await this.loadNotes();
            await this.loadNoteDetail(this.selectedNote.slug);
          } catch (err) {
            this.handleError(err);
          }
        },

        async toggleNoteArchive(archive) {
          try {
            await this.api('POST', `/api/notes/${this.selectedNote.slug}/${archive ? 'archive' : 'unarchive'}`);
            this.showToast(`Note ${archive ? 'archived' : 'restored'}.`);
            await this.loadNotes();
            await this.loadNoteDetail(this.selectedNote.slug);
          } catch (err) {
            this.handleError(err);
          }
        },

        async loadDesignDocs() {
          this.loadingList = true;
          try {
            this.designDocs = await this.api('GET', '/api/design-docs');
            this.allDesignDocs = (this.designDocs || []).map(d => ({ id: d.id, slug: d.slug, title: d.title }));
          } catch (err) {
            this.handleError(err);
          } finally {
            this.loadingList = false;
          }
        },

        filteredDesignDocs() {
          const q = (this.designDocFilter || '').toLowerCase().trim();
          if (!q) return this.designDocs;
          return (this.designDocs || []).filter(doc => `${doc.title} ${doc.slug}`.toLowerCase().includes(q));
        },

        async loadDesignDocDetail(slug) {
          try {
            this.selectedDesignDoc = await this.api('GET', `/api/design-docs/${slug}`);
          } catch (err) {
            this.handleError(err);
          }
        },

        async saveDesignDoc() {
          try {
            await this.api('PATCH', `/api/design-docs/${this.selectedDesignDoc.slug}`, {
              title: this.selectedDesignDoc.title,
              content: this.selectedDesignDoc.content,
              tags: Array.isArray(this.selectedDesignDoc.tags) ? this.selectedDesignDoc.tags : this.csvToArray(this.selectedDesignDoc.tags || ''),
            });
            this.showToast('Design doc updated.');
            await this.loadDesignDocs();
            await this.loadDesignDocDetail(this.selectedDesignDoc.slug);
          } catch (err) {
            this.handleError(err);
          }
        },

        async loadIssues() {
          this.loadingList = true;
          try {
            const query = this.issueFilter ? `?task=${encodeURIComponent(this.issueFilter)}` : '';
            this.issues = await this.api('GET', `/api/issues${query}`);
          } catch (err) {
            this.handleError(err);
          } finally {
            this.loadingList = false;
          }
        },

        async loadIssueDetail(slug) {
          try {
            this.selectedIssue = await this.api('GET', `/api/issues/${slug}`);
          } catch (err) {
            this.handleError(err);
          }
        },

        async saveIssue() {
          try {
            const linkedRunbookIds = Array.isArray(this.selectedIssue.linked_runbook_ids)
              ? this.selectedIssue.linked_runbook_ids
              : [];
            await this.api('PATCH', `/api/issues/${this.selectedIssue.slug}`, {
              title: this.selectedIssue.title,
              severity: this.selectedIssue.severity,
              task_slug: this.selectedIssue.linked_task_slug || null,
              linked_runbook_ids: linkedRunbookIds,
              triage_steps: this.selectedIssue.triage_steps || null,
              root_cause: this.selectedIssue.root_cause || null,
              resolution: this.selectedIssue.resolution || null,
              lessons_learned: this.selectedIssue.lessons_learned || null,
            });
            this.showToast('Issue updated.');
            await this.loadIssues();
            await this.loadIssueDetail(this.selectedIssue.slug);
            if (this.selectedTask?.slug === this.selectedIssue.linked_task_slug) await this.loadTaskDetail(this.selectedTask.slug);
          } catch (err) {
            this.handleError(err);
          }
        },

        async resolveIssue() {
          try {
            await this.api('POST', `/api/issues/${this.selectedIssue.slug}/resolve`);
            this.showToast('Issue resolved.');
            await this.loadIssues();
            await this.loadIssueDetail(this.selectedIssue.slug);
          } catch (err) {
            this.handleError(err);
          }
        },

        async openIssue(slug) {
          this.section = 'issues';
          await this.loadIssues();
          await this.loadIssueDetail(slug);
        },

        async loadRunbooks() {
          this.loadingList = true;
          try {
            const query = this.runbookProjectFilter ? `?project_slug=${encodeURIComponent(this.runbookProjectFilter)}` : '';
            this.runbooks = await this.api('GET', `/api/runbooks${query}`);
            this.allRunbooks = (this.runbooks || []).map(r => ({ id: r.id, slug: r.slug, title: r.title }));
          } catch (err) {
            this.handleError(err);
          } finally {
            this.loadingList = false;
          }
        },

        filteredRunbooks() {
          const q = (this.runbookFilter || '').toLowerCase().trim();
          if (!q) return this.runbooks;
          return (this.runbooks || []).filter(runbook => `${runbook.title} ${runbook.slug}`.toLowerCase().includes(q));
        },

        async loadRunbookDetail(slug) {
          try {
            this.selectedRunbook = await this.api('GET', `/api/runbooks/${slug}`);
          } catch (err) {
            this.handleError(err);
          }
        },

        async saveRunbook() {
          try {
            const linkedIssueIds = Array.isArray(this.selectedRunbook.linked_issue_ids)
              ? this.selectedRunbook.linked_issue_ids
              : [];
            await this.api('PATCH', `/api/runbooks/${this.selectedRunbook.slug}`, {
              title: this.selectedRunbook.title,
              service: this.selectedRunbook.service,
              category: this.selectedRunbook.category,
              steps: this.selectedRunbook.steps,
              status: this.selectedRunbook.status,
              tags: Array.isArray(this.selectedRunbook.tags) ? this.selectedRunbook.tags : this.csvToArray(this.selectedRunbook.tags || ''),
              symptoms: this.selectedRunbook.symptoms || null,
              prerequisites: this.selectedRunbook.prerequisites || null,
              verification: this.selectedRunbook.verification || null,
              escalation: this.selectedRunbook.escalation || null,
              linked_issue_ids: linkedIssueIds,
              project_slug: this.selectedRunbook.project_slug || null,
            });
            this.showToast('Runbook updated.');
            await this.loadRunbooks();
            await this.loadRunbookDetail(this.selectedRunbook.slug);
          } catch (err) {
            this.handleError(err);
          }
        },

        async validateRunbook() {
          try {
            await this.api('POST', `/api/runbooks/${this.selectedRunbook.slug}/validate`);
            this.showToast('Runbook validated.');
            await this.loadRunbooks();
            await this.loadRunbookDetail(this.selectedRunbook.slug);
          } catch (err) {
            this.handleError(err);
          }
        },

        async openRunbook(slug) {
          this.section = 'runbooks';
          await this.loadRunbooks();
          await this.loadRunbookDetail(slug);
        },

        async loadToolDocs() {
          this.loadingList = true;
          try {
            this.toolDocs = await this.api('GET', '/api/tool-docs');
          } catch (err) {
            this.handleError(err);
          } finally {
            this.loadingList = false;
          }
        },

        async loadToolDocDetail(slug) {
          try {
            this.selectedToolDoc = await this.api('GET', `/api/tool-docs/${slug}`);
          } catch (err) {
            this.handleError(err);
          }
        },

        async reindexToolDoc() {
          try {
            await this.api('POST', `/api/tool-docs/${this.selectedToolDoc.slug}/reindex`);
            this.showToast('Tool doc reindex started.');
            await this.loadToolDocDetail(this.selectedToolDoc.slug);
          } catch (err) {
            this.handleError(err);
          }
        },

        async saveToolDoc() {
          try {
            await this.api('PATCH', `/api/tool-docs/${this.selectedToolDoc.slug}`, {
              title: this.selectedToolDoc.title,
              repo_url: this.selectedToolDoc.repo_url,
              tags: Array.isArray(this.selectedToolDoc.tags) ? this.selectedToolDoc.tags : (this.selectedToolDoc.tags || '').split(',').map(t => t.trim()).filter(Boolean),
            });
            this.showToast('Tool doc updated.');
            await this.loadToolDocs();
            await this.loadToolDocDetail(this.selectedToolDoc.slug);
          } catch (err) {
            this.handleError(err);
          }
        },

        async loadContextDocs() {
          this.loadingList = true;
          try {
            this.contextDocs = await this.api('GET', '/api/context-docs');
            this.allContextDocs = (this.contextDocs || []).map(d => ({ id: d.id, slug: d.slug, title: d.title }));
          } catch (err) {
            this.handleError(err);
          } finally {
            this.loadingList = false;
          }
        },

        filteredContextDocs() {
          const q = (this.contextDocFilter || '').toLowerCase().trim();
          if (!q) return this.contextDocs;
          return (this.contextDocs || []).filter(doc => `${doc.title} ${doc.slug}`.toLowerCase().includes(q));
        },

        async loadContextDocDetail(slug) {
          try {
            const doc = await this.api('GET', `/api/context-docs/${slug}`);
            this.selectedContextDoc = { ...doc, links: doc.links || [], _newLink: { entity_type: '', entity_slug: '' } };
          } catch (err) {
            this.handleError(err);
          }
        },

        async saveContextDoc() {
          try {
            await this.api('PATCH', `/api/context-docs/${this.selectedContextDoc.slug}`, {
              title: this.selectedContextDoc.title,
              content: this.selectedContextDoc.content,
              tags: Array.isArray(this.selectedContextDoc.tags) ? this.selectedContextDoc.tags : this.csvToArray(this.selectedContextDoc.tags || ''),
            });
            this.showToast('Context doc updated.');
            await this.loadContextDocs();
            await this.loadContextDocDetail(this.selectedContextDoc.slug);
          } catch (err) {
            this.handleError(err);
          }
        },

        async addContextDocLink() {
          const { entity_type, entity_slug } = this.selectedContextDoc._newLink;
          if (!entity_type || !entity_slug) {
            this.showToast('Entity type and slug are required.', 'error');
            return;
          }
          try {
            await this.api('POST', `/api/context-docs/${this.selectedContextDoc.slug}/links`, { entity_type, entity_slug });
            this.showToast('Link added.');
            await this.loadContextDocDetail(this.selectedContextDoc.slug);
          } catch (err) {
            this.handleError(err);
          }
        },

        async removeContextDocLink(link) {
          if (!confirm('Remove this link?')) return;
          try {
            await this.api('DELETE', `/api/context-docs/${this.selectedContextDoc.slug}/links/${link.entity_type}/${link.entity_slug}`);
            this.showToast('Link removed.');
            await this.loadContextDocDetail(this.selectedContextDoc.slug);
          } catch (err) {
            this.handleError(err);
          }
        },

        async openContextDoc(slug) {
          if (!slug) return;
          this.section = 'contextDocs';
          await this.loadContextDocs();
          await this.loadContextDocDetail(slug);
        },

        async openDesignDoc(slug) {
          if (!slug) return;
          this.section = 'designDocs';
          await this.loadDesignDocs();
          await this.loadDesignDocDetail(slug);
        },

      };
    }
  </script>
</body>
</html>
